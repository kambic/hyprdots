# Configurations
exec-once = hyprctl setcursor Bibata-Modern-Amber 24

source = configs/animation.conf
source = configs/enviromentvars.conf
source = configs/general.conf
source = configs/keybindings.conf
source = configs/monitor.conf

source = configs/workspaces.conf

source = configs/windowrules.conf
# source = configs/windowrules_v3.conf

source = ./machine.conf

# Startup Apps & Services
$logPath = $HOME/.cache/log/

exec-once = hypridle
exec-once = thunar --daemon

exec-once = waybar >> $logPath/waybar.log 2>&1

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent

# exec-once = udiskie &

exec-once = waypaper --restore &
exec-once = sleep 2 && keepassxc --minimized  --keyfile ~/.local/secrets/special.key ~/.local/secrets/TopSecret.kdbx
exec-once = sleep 3 && kdeconnect-indicator >> $logPath/kdeconnect.log 2>&1
exec-once = hypridle
