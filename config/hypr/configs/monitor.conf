# Visit https://wiki.hyprland.org/Configuring/Monitors/ for more options

# syntax: moniter, resolution@refresh rate, position, scale, transform, angle
monitor = DP-1, 2560x1440@165, 0x0, 1, bitdepth, 10, vrr, 1
monitor = eDP-1, 2880x1620@50, 0x0, 1.5 #, transform,0

### XWayland (fix blurry legacy X11 apps)
xwayland {
    force_zero_scaling = true
}
