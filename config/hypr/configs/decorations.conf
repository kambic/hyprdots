source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
    border_size = 2
    gaps_in = 2
    gaps_out = 4
    
    col.active_border = $color12 
    col.inactive_border = $color10
}

decoration {
    # Geometry
    rounding = 5
    rounding_power = 1

    # Opacity
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    # Dimming
    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.8

    # Shadow (merged settings)
    shadow {
        enabled = true
        range = 10
        render_power = 2
        # solid RGBA fallback for subtle shadow, keep inactive color from theme
        color = 0x33000000
        color_inactive = $color10
    }

    # Blur (merged, higher-quality defaults)
    blur {
        enabled = true

        # CORE QUALITY
        size = 8
        passes = 2

        # SPEED HACKS
        new_optimizations = true
        xray = true
        popups = true
        special = true

        # Respect client alpha for frosted effects (Waybar/etc)
        ignore_opacity = false

        # FINE TUNE VISUALS
        noise = 0.011
        contrast = 1.0
        brightness = 0.95
        vibrancy = 0.2
        vibrancy_darkness = 0.15
    }
}

group {
    col.border_active = $color15
    groupbar {
        enabled = true
        col.active = $color0
        font_size = 10
    }

    auto_group = false
}