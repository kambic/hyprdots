source = ~/.config/hypr/configs/colors.conf

general {
    gaps_workspaces = 0
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    border_size = 1
    #
    # col.active_border = $fg
    # col.inactive_border = $bg
    # col.nogroup_border_active = $fg
    # col.nogroup_border = $bg
    #

    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    layout = dwindle
    no_border_on_floating = true
    no_focus_fallback = true
    allow_tearing = true

    snap {
        enabled = true
        window_gap = 5
        monitor_gap = 5
        border_overlap = true
    }
}


decoration {
    rounding = 5
    rounding_power = 1

    active_opacity = 1
    inactive_opacity = 0.82
    fullscreen_opacity = 1

    dim_inactive = false
    dim_strength = 0.1
    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = 0x33000000
    }
    # blur {
    #     enabled = true
    # 	ignore_opacity = false
    #     new_optimizations = true
    #     xray = true
    #
    #     size = 4
    #     passes = 2
    #     noise = 0.0
    #     contrast = 0.8
    #     brightness = 0.8
    #     vibrancy = 0.1
    #     vibrancy_darkness = 0.0
    #
    #     popups = true
    #     special = true
    # }
blur {
        enabled = true

        # ── CORE QUALITY ─────────────────────
        size = 6              # 4–8 is sweet spot (px)
        passes = 2            # 1 = fast, 2 = good, 3+ = GPU killer

        # ── SPEED HACKS ──────────────────────
        new_optimizations = true     # mandatory
        xray = true                  # blur only visible pixels
        popups = false               # skip blur on popups (tooltips, menus)
        ignore_opacity = false       # respect alpha → Waybar stays frosted

        # ── FINE TUNE VISUALS ───────────────
        noise = 0.011                # reduce grain (0.005–0.02)
        contrast = 1.0               # 0.9–1.1
        brightness = 0.95            # avoid washed-out look
        vibrancy = 0.2               # subtle depth (0.0–0.3)
        vibrancy_darkness = 0.15
    }


}
layerrule = blur, waybar
misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
    font_family = sans
    vrr = 0
    focus_on_activate = true
    anr_missed_pings = 20
}

binds {
  drag_threshold = 10  # Fire a drag event only after dragging for more than 10px
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

cursor {
    sync_gsettings_theme = true
    no_hardware_cursors = true
  	enable_hyprcursor = true

}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
    orientation = center
}


