# Configurations
source = $HOME/.config/hypr/configs/animation.conf
source = $HOME/.config/hypr/configs/enviromentvars.conf
source = $HOME/.config/hypr/configs/general.conf
source = $HOME/.config/hypr/configs/input.conf
source = $HOME/.config/hypr/configs/keybindings.conf
source = $HOME/.config/hypr/configs/monitor.conf
source = $HOME/.config/hypr/configs/windowrules.conf

source = ./machine.conf

# Startup Apps & Services
# exec-once = dbus-update-activation-environment --systemd --all
# exec-once = systemctl --user import-environment
$logPath = $HOME/.cache/log/

# Core components (authentication, lock screen, notification daemon)
exec-once = hypridle
# exec-once = dbus-update-activation-environment --all
# exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Some fix idk
exec-once = hyprctl setcursor Bibata-Modern-Ice 24  # Replace with your theme/size

exec-once = waybar >> $logPath/waybar.log 2>&1

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = systemctl --user start hyprpolkitagent
# exec-once = udiskie &
exec-once = waypaper --restore &
exec-once = sleep 2 && keepassxc --minimized  --keyfile ~/.local/secrets/special.key ~/.local/secrets/TopSecret.kdbx
exec-once = sleep 3 && kdeconnect-indicator >> $logPath/kdeconnect.log 2>&1
exec-once = hypridle
