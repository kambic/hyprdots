#~/.config/hypr/hyprqt6engine.conf
theme {
  style = Fusion
  color_scheme = /usr/share/color-schemes/RetrosmartCarbonSky.colors
  icon_theme = Colloid
  font = Sans
  font_size = 10
  font_fixed = mono
  font_fixed_size = 10
}

misc {
  single_click_activate = true
  menus_have_icons = true
  shortcuts_for_context_menus = true
}