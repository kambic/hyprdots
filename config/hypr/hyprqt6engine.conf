# Hyprland → Qt6 theme engine configuration
# Place this file at: ~/.config/hypr/hyprqt6engine.conf

########################################
#  THEME
########################################

# Choose between: adwaita, adwaita-dark, kvantum, fusion, breezemod, qtct
theme=adwaita-dark

# If using Kvantum (theme=kvantum), set the Kvantum theme name:
#kvantum_theme=Catppuccin-Mocha

########################################
#  FONT SETTINGS
########################################

font.family=Sans
font.size=11

########################################
#  WINDOW & UI BEHAVIOR
########################################

# Rounded corners on Qt windows
decorations.rounding=true
decorations.rounding.radius=8

# Disable Qt window shadows (Hyprland handles its own shadows)
decorations.shadows=false

# Enable window opacity (0.0–1.0)
window.opacity=1.0

########################################
#  COLOR OVERRIDES (optional)
########################################

# Hex colors without #
# These override the selected theme.
colors.accent=89b4fa
colors.background=1e1e2e
colors.foreground=cdd6f4

# Button colors
colors.button.bg=313244
colors.button.fg=cdd6f4

########################################
#  HIGH DPI / SCALING
########################################

# Enable Qt auto DPI
dpi.auto=true

# Manual scaling factor (if dpi.auto=false)
#scale=1.0

########################################
#  MISC
########################################

# Enable fractional scaling workaround
fractional_scaling.fix=false

# Smooth animations
animations.smooth=true
animations.duration=120
